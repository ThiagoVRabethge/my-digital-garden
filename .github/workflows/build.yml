# ─────────────────────────────────────────────────────────────────────────────
# My Digital Garden – GitHub Actions Build (uv)
# ─────────────────────────────────────────────────────────────────────────────

name: Build APK & EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  PYTHON_VERSION:  "3.12"
  FLUTTER_VERSION: "3.41.0"   # versão mínima exigida pelo flet 0.84
  JAVA_VERSION:    "21"

# ─── JOB 1: APK Android ──────────────────────────────────────────────────────
jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Instalar dependências
        run: uv sync

      - name: Desabilitar analytics
        run: flutter config --no-analytics

      - name: Build APK
        # --yes suprime todos os prompts interativos do flet build
        run: uv run flet build apk --yes --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/apk/*.apk
          if-no-files-found: error
          retention-days: 7

# ─── JOB 2: EXE Windows ──────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configurar Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Instalar dependências
        run: uv sync

      - name: Desabilitar analytics
        run: flutter config --no-analytics

      - name: Build Windows
        run: uv run flet build windows --yes --verbose

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/windows/**
          if-no-files-found: error
          retention-days: 7